<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f5efe6"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#1d4ed8"/>

  <!-- Guyana Flag (Golden Arrowhead) — centered left column -->
  <!-- Flag is 360x240, centered at x=240, y=195 -->
  <!-- Green background -->
  <rect x="60" y="195" width="360" height="240" fill="#009E49"/>
  <!-- White outer triangle (arrowhead pointing right) -->
  <polygon points="60,195 60,435 420,315" fill="#ffffff"/>
  <!-- Black inner triangle -->
  <polygon points="60,207 60,423 404,315" fill="#000000"/>
  <!-- Gold inner triangle -->
  <polygon points="60,219 60,411 385,315" fill="#FCD116"/>
  <!-- Red innermost triangle -->
  <polygon points="60,258 60,372 240,315" fill="#CE1126"/>
  <!-- Clip the triangles to stay within the flag rect -->
  <defs>
    <clipPath id="flagClip">
      <rect x="60" y="195" width="360" height="240"/>
    </clipPath>
  </defs>
  <!-- Redo flag layers with clip -->
  <rect x="60" y="195" width="360" height="240" fill="#009E49" clip-path="url(#flagClip)"/>
  <polygon points="60,195 60,435 420,315" fill="#ffffff" clip-path="url(#flagClip)"/>
  <polygon points="60,207 60,423 404,315" fill="#000000" clip-path="url(#flagClip)"/>
  <polygon points="60,219 60,411 385,315" fill="#FCD116" clip-path="url(#flagClip)"/>
  <polygon points="60,258 60,372 240,315" fill="#CE1126" clip-path="url(#flagClip)"/>
  <!-- Flag border -->
  <rect x="60" y="195" width="360" height="240" fill="none" stroke="#d6c9b5" stroke-width="2"/>

  <!-- Right column: text content -->
  <!-- Eyebrow -->
  <text x="490" y="218" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="400" letter-spacing="4" fill="#a8997f" text-transform="uppercase">LIVE COUNTER</text>

  <!-- Main heading -->
  <text x="490" y="298" font-family="'Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#1c1917">Guyana</text>
  <text x="490" y="372" font-family="'Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#1c1917">Population</text>

  <!-- Divider -->
  <rect x="490" y="398" width="80" height="4" fill="#1d4ed8" rx="2"/>

  <!-- Subline -->
  <text x="490" y="444" font-family="'Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="400" fill="#57534e">Real-time births, deaths &amp; historical data</text>
  <text x="490" y="476" font-family="'Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="400" fill="#57534e">from the World Bank</text>

  <!-- Footer brand -->
  <text x="490" y="560" font-family="'Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" letter-spacing="-0.5" fill="#a8997f">Savanna Studios</text>

  <!-- LIVE badge top-right -->
  <rect x="1068" y="44" width="96" height="36" rx="6" fill="#fef3e2" stroke="#d4975f" stroke-width="1.5"/>
  <circle cx="1088" cy="62" r="5" fill="#b45309"/>
  <text x="1100" y="67" font-family="'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="700" letter-spacing="2" fill="#b45309">LIVE</text>
</svg>
